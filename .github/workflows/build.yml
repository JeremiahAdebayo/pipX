name: Build Flet Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flet
        run: pip install flet requests

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.1"
          channel: "stable"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Build APK
        run: |
          echo "y" | flet build apk \
            --project "Lot Size Calculator" \
            --product "pipX" \
            --org com.jrmhadebayo \
            --build-version "1.0.0"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lot-size-calculator-apk
          path: build/apk/*.apk
